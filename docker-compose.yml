version: '3.8'

services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  face-api:
    build:
      context: ./python-face-api
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    volumes:
      - ./python-face-api/faces:/app/faces
      - ./python-face-api/recognition_logs:/app/recognition_logs
    environment:
      - FACE_API_HOST=0.0.0.0
      - FACE_API_PORT=5000

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - '5001:5001'
    environment:
      - PORT=5001
      - MONGODB_URI=mongodb://mongodb:27017/faceattendance
      - FACE_API_URL=http://face-api:5000
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - CORS_ORIGIN=http://localhost:5173
    depends_on:
      - mongodb
      - face-api

  frontend:
    build:
      context: ./facefrontend
      dockerfile: Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  mongo_data:
